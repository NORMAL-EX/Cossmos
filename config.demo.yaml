# 演示配置 / demo configuration
# 由 GitHub Actions 定时以 `once` 模式运行，结果发布到 GitHub Pages。
# Run on a schedule by GitHub Actions in `once` mode; published to GitHub Pages.
# 这里监控一组公开、稳定的站点用于展示。/ Monitors public, stable sites for the demo.

site:
  title: "Cossmos 演示 · Status Demo"
  description: "使用 COSS UI 构建的服务状态监测器 · 每 10 分钟由 GitHub Actions 刷新"
  github: "https://github.com/NORMAL-EX/Cossmos"
  refreshInterval: 600
  # 演示用占位备案号（请替换为你自己的）/ placeholder filing numbers (replace with your own)
  icp: "京ICP备00000000号-1"
  icpLink: "https://beian.miit.gov.cn/"
  policeIcp: "京公网安备 11000000000000号"
  policeIcpLink: "https://beian.mps.gov.cn/"
  footer: "Demo only · 仅供演示"

monitor:
  interval: 600
  timeout: 12
  historySize: 90
  concurrency: 8

server:
  listen: ":8080"

services:
  - name: "GitHub"
    group: "开发者服务 / Dev"
    description: "github.com"
    type: http
    url: "https://github.com"
    expectStatus: [200]
    degradedMs: 1500

  - name: "GitHub API"
    group: "开发者服务 / Dev"
    type: http
    url: "https://api.github.com"
    expectStatus: [200]
    keyword: "current_user_url"
    degradedMs: 1500

  - name: "npm Registry"
    group: "开发者服务 / Dev"
    type: http
    url: "https://registry.npmjs.org/-/ping"
    expectStatus: [200]
    degradedMs: 1500

  - name: "Go Proxy"
    group: "开发者服务 / Dev"
    type: http
    url: "https://proxy.golang.org/"
    expectStatus: [200, 404]
    degradedMs: 1500

  - name: "Cloudflare"
    group: "基础设施 / Infra"
    description: "cloudflare.com"
    type: http
    url: "https://www.cloudflare.com"
    expectStatus: [200]
    degradedMs: 1200

  - name: "Cloudflare DNS"
    group: "基础设施 / Infra"
    description: "1.1.1.1:443"
    type: tcp
    host: "1.1.1.1"
    port: 443
    degradedMs: 600

  - name: "Google DNS"
    group: "基础设施 / Infra"
    description: "8.8.8.8:53"
    type: tcp
    host: "8.8.8.8"
    port: 53
    degradedMs: 600

  - name: "Wikipedia"
    group: "内容 / Content"
    type: http
    url: "https://www.wikipedia.org"
    expectStatus: [200]
    degradedMs: 2000

  - name: "MDN Web Docs"
    group: "内容 / Content"
    type: http
    url: "https://developer.mozilla.org/en-US/"
    expectStatus: [200]
    degradedMs: 2500
