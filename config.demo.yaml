# Cloud-PE 服务状态检测配置
# 由 GitHub Actions 定时以 `once` 模式运行并发布到 GitHub Pages；同时是
# Docker 镜像内置的默认配置（COSSMOS_CONFIG=/app/config.yaml）。
# Default config baked into the Docker image and used by the Pages demo.

site:
  title: "Cloud-PE 服务状态检测"
  description: "这里是 Cloud-PE 项目的服务状态检测页面"
  github: "https://github.com/Cloud-PE"
  refreshInterval: 60
  icp: "鲁ICP备2023028944号-3"
  icpLink: "https://beian.miit.gov.cn/"
  footer: "© Cloud-PE Dev."

monitor:
  interval: 60        # serve 模式两轮检查间隔（秒）
  timeout: 12
  historySize: 90
  concurrency: 6

server:
  listen: ":8080"

services:
  - name: "Cloud-PE 官方网站"
    type: http
    url: "https://www.cloud-pe.cn"
    expectStatus: [200, 301, 302]
    degradedMs: 2000

  - name: "Cloud-PE 文件下载站"
    type: http
    url: "https://files.cloud-pe.cn"
    expectStatus: [200, 301, 302, 403]
    degradedMs: 2500

  - name: "Cloud-PE Docs"
    type: http
    url: "https://docs.cloud-pe.cn"
    expectStatus: [200, 301, 302]
    degradedMs: 2000

  - name: "Cloud-PE API接口"
    type: http
    url: "https://api.cloud-pe.cn"
    expectStatus: [200, 301, 302, 401, 403, 404]
    degradedMs: 2000

  - name: "Cloud-PE 云盘"
    type: http
    url: "https://pan.sysre.cn"
    expectStatus: [200, 301, 302]
    degradedMs: 2500
